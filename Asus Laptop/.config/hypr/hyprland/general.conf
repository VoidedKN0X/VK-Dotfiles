general {
    layout = dwindle

    allow_tearing = false  # Allows `immediate` window rule to work

    gaps_workspaces = 20
    gaps_in = 5
    gaps_out = 10
    border_size = 3

    col.active_border = rgb(198,120,221)
    col.inactive_border = rgb(171,178,191)
}

dwindle {
	preserve_split = true
	smart_split = false
	smart_resizing = true
}